services:
  - type: web
    name: facturacion-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        sync: false
      - key: EMPRESA_RAZON_SOCIAL
        value: "Mi Empresa S.A.C."
      - key: EMPRESA_RUC
        value: "20123456789"
      - key: EMPRESA_DIRECCION
        value: "Lima, Peru"
      - key: IGV_PORCENTAJE
        value: "18"

  - type: web
    name: facturacion-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
